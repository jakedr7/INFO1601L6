<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>repl.it</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  </head>
  <body>
    <h1>My Page</h1>

    <input type="button" id="alertBtn" value="alert" onclick="alertFun()"/>
    <input type="button" value="confirm" onclick="confirmFun()"/>
    <input type="button" value="prompt" onclick="promptFun()"/>

    <span id="result"></span>

    <br><br>

    <img src="https://www.placecage.com/200/300" alt="Place Cage" onload="loaded()">

    <br><br>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>name</th>
          <th>Type</th>
          <th>website</th>
        </tr>
      </thead>
      <tbody id="tableResult"></tbody>
    </table>

    <script>
      function alertFun(){
        alert("Hello!");
      }

      function confirmFun(){
        let didConfirm = confirm("Are you sure?");
        document.querySelector("#result").innerHTML = didConfirm;
      }

      function promptFun(){
        let name = prompt("Enter your name");
        document.querySelector("#result").innerHTML = name;
      }

      function loaded(){
        console.log("img loaded");
      }

      function drawTable(records){
        let result = document.querySelector("#tableResult");
        let html = "";

        for(let record of records){
          html += `<tr>
            <td>${record.id}</td>
            <td>${record.name}</td>
            <td>${record.brewery_type}</td>
            <td>${record.website_url}</td>
          </tr>`;
        }

        result.innerHTML = html;
      }

      function loadData(){
        fetch("https://api.openbrewerydb.org/v1/breweries")
          .then(function(response){
            return response.json();
          })
          .then(function(data){
            drawTable(data);
          })
          .catch(function(error){
            console.log(error);
          });
      }

      loadData();
    </script>
    <script src="script.js"></script>
  </body>
</html>
